<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revora Research — Advanced Research Compounds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --violet:#6b4e9e;--violet-lt:#8a6fc0;--red:#e0393e;--green:#3f8f57;
    --display:"Cormorant Garamond",Georgia,serif;--sans:"Inter",-apple-system,system-ui,sans-serif;
  }
  /* ===== LIGHT THEME (ruo-style all white) ===== */
  html[data-theme="light"]{
    --bg:#ffffff;--bg2:#f5f6f8;--bg3:#eceef4;--card:#eef0f6;--card-line:#e2e4ec;
    --text:#15171b;--text-dim:#6a6f77;--text-soft:#9096a0;
    --nav-bg:rgba(255,255,255,.82);--nav-line:rgba(10,11,13,.08);--nav-text:#3a3f47;--nav-text-h:#0a0b0d;
    --hero-bg:radial-gradient(120% 90% at 50% 0%,#fafbfc 0%,#eef0f4 55%,#e4e7ec 100%);--hero-text:#15171b;
    --hero-sub:#8b9098;--chrome-on-dark:0;
    --sec-dark-bg:linear-gradient(180deg,#f4f5f8,#e7e9ef);--sec-dark-text:#15171b;--sec-dark-dim:#6a6f77;
    --step-bg:linear-gradient(180deg,#fff,#f1f2f6);--step-line:#e2e4ec;--step-num:#15171b;
    --foot-bg:#f0f1f5;--foot-text:#6a6f77;--foot-head:#15171b;--foot-line:rgba(10,11,13,.10);
    --badge-bg:#f5f6f8;--badge-line:rgba(10,11,13,.08);--badge-text:#54585f;--badge-icon:#8b9098;
    --gate-bg:radial-gradient(120% 100% at 50% 0%,#fafbfc 0%,#eef0f4 55%,#e2e5eb 100%);
    --gate-card:rgba(255,255,255,.9);--gate-line:rgba(10,11,13,.10);--gate-text:#15171b;--gate-dim:#6a6f77;
    --logo-fill:#2a2d33;
  }
  /* ===== DARK THEME (all black) ===== */
  html[data-theme="dark"]{
    --bg:#08090b;--bg2:#0d0f12;--bg3:#111318;--card:#131519;--card-line:rgba(255,255,255,.08);
    --text:#f2f3f5;--text-dim:#9096a0;--text-soft:#6a7078;
    --nav-bg:rgba(8,9,11,.6);--nav-line:rgba(255,255,255,.10);--nav-text:#b8bcc2;--nav-text-h:#fff;
    --hero-bg:radial-gradient(120% 90% at 50% 0%,#1c2026 0%,#0e1013 45%,#060708 100%);--hero-text:#fff;
    --hero-sub:#7f858d;--chrome-on-dark:1;
    --sec-dark-bg:linear-gradient(180deg,#0d0f12,#060708);--sec-dark-text:#fff;--sec-dark-dim:#8b9098;
    --step-bg:linear-gradient(180deg,#131519,#0b0d10);--step-line:rgba(255,255,255,.08);--step-num:#fff;
    --foot-bg:#08090b;--foot-text:#8b9098;--foot-head:#c4c8ce;--foot-line:rgba(255,255,255,.10);
    --badge-bg:#08090b;--badge-line:rgba(255,255,255,.10);--badge-text:#aeb3ba;--badge-icon:#c4c8ce;
    --gate-bg:radial-gradient(120% 100% at 50% 0%,#1c2026 0%,#0c0e11 55%,#050607 100%);
    --gate-card:rgba(18,20,24,.72);--gate-line:rgba(255,255,255,.10);--gate-text:#fff;--gate-dim:#9ba0a8;
    --logo-fill:#e8eaed;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  section[id],header[id]{scroll-margin-top:70px}
  body{font-family:var(--sans);color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
  body.locked{overflow:hidden}
  .wrap{max-width:1200px;margin:0 auto;padding:0 28px}
  .track{letter-spacing:.34em;text-transform:uppercase}
  .track-sm{letter-spacing:.22em;text-transform:uppercase}
  .chrome{background:linear-gradient(175deg,#fff 0%,#dfe2e6 22%,#9ba0a8 48%,#f4f5f7 60%,#8b9098 78%,#c9cdd2 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  /* in light theme, chrome text on light bg needs darker gradient to stay legible */
  html[data-theme="light"] .chrome{background:linear-gradient(175deg,#5a5f68 0%,#2e3138 30%,#7a8088 52%,#40444c 72%,#666c74 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  html[data-theme="light"] .hero .chrome,html[data-theme="light"] .gate-card .chrome{background:linear-gradient(175deg,#4a4f58 0%,#26292f 34%,#6a7078 54%,#34373d 74%,#565c64 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* ===== AGE GATE ===== */
  .gate{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--gate-bg)}
  .gate.hide{display:none}
  .gate-mol{position:absolute;inset:0;opacity:.3;pointer-events:none}
  .gate-card{position:relative;z-index:2;max-width:480px;width:100%;text-align:center;color:var(--gate-text);
    background:var(--gate-card);backdrop-filter:blur(16px);border:1px solid var(--gate-line);border-radius:10px;padding:48px 40px}
  .gate-card .r{font-family:var(--display);font-weight:700;font-size:56px;line-height:.8}
  .gate-card .nm{letter-spacing:.42em;font-size:15px;margin-top:6px}
  .gate-card .rule{width:60px;height:1px;background:var(--gate-line);margin:24px auto}
  .gate-card h2{font-family:var(--display);font-weight:600;font-size:34px;line-height:1.1;margin-bottom:14px}
  .gate-card .age{color:var(--violet-lt)}
  html[data-theme="light"] .gate-card .age{color:var(--violet)}
  .gate-card p{font-size:13px;color:var(--gate-dim);line-height:1.6;margin-bottom:22px}
  .gate-check{display:flex;gap:11px;text-align:left;align-items:flex-start;margin-bottom:24px;font-size:12px;color:var(--gate-dim);line-height:1.5;cursor:pointer}
  .gate-check input{margin-top:3px;width:17px;height:17px;accent-color:var(--violet);flex-shrink:0;cursor:pointer}
  .gate-btns{display:flex;gap:12px}
  .gate-btns button{flex:1;font-family:var(--sans);font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:15px;border-radius:3px;cursor:pointer;transition:all .2s;border:1px solid transparent}
  .gate-enter{background:linear-gradient(180deg,#fff,#d5d8dd);color:#0a0b0d;font-weight:600}
  html[data-theme="light"] .gate-enter{background:#15171b;color:#fff}
  .gate-enter:disabled{opacity:.4;cursor:not-allowed}
  .gate-enter:not(:disabled):hover{transform:translateY(-2px)}
  .gate-exit{background:none;border:1px solid var(--gate-line)!important;color:var(--gate-dim)}
  .gate-exit:hover{color:var(--gate-text)}
  .gate-note{margin-top:20px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft)}

  /* ===== NAV ===== */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 0;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--nav-line);transition:padding .3s,background .3s}
  nav.small{padding:10px 0}
  .nav-in{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
  .brand .r{font-family:var(--display);font-weight:700;font-size:26px;line-height:1}
  .brand .nm{font-size:15px;font-weight:500;letter-spacing:.32em;color:var(--nav-text-h)}
  .nav-right{display:flex;align-items:center;gap:20px}
  .nav-links{display:flex;gap:26px;align-items:center}
  .nav-links a{color:var(--nav-text);text-decoration:none;font-size:12px;letter-spacing:.14em;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover{color:var(--nav-text-h)}
  /* Wholesale/Inquire is hamburger-menu only on desktop */
  @media(min-width:821px){.nav-links .nav-hide-desktop{display:none!important}}
  .nav-cta{border:1px solid var(--nav-text);padding:9px 20px;border-radius:2px;color:var(--nav-text-h)!important}
  .nav-cta:hover{background:var(--nav-text-h);color:var(--bg)!important}
  .icon-btn{background:none;border:0;cursor:pointer;display:flex;align-items:center;color:var(--nav-text-h)}
  .icon-btn svg{width:19px;height:19px;stroke:var(--nav-text-h);fill:none;stroke-width:1.5}
  .cart-ic{position:relative}
  .cart-count{position:absolute;top:-8px;right:-10px;background:var(--violet);color:#fff;font-size:10px;font-weight:600;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .lang{display:inline-flex;border:1px solid var(--nav-line);border-radius:2px;overflow:hidden}
  .lang button{background:none;border:0;color:var(--nav-text);font-family:var(--sans);font-size:11px;letter-spacing:.12em;padding:7px 10px;cursor:pointer;transition:all .2s}
  .lang button.on{background:var(--nav-text-h);color:var(--bg);font-weight:600}
  .burger{display:none;background:none;border:0;color:var(--nav-text-h);font-size:22px;cursor:pointer}

  /* ===== HERO ===== */
  .hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--hero-bg);color:var(--hero-text);overflow:hidden}
  .mol{position:absolute;inset:0;opacity:.5;pointer-events:none}
  html[data-theme="light"] .mol{opacity:.28}
  .beam{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:70%;height:70%;background:radial-gradient(ellipse at top,rgba(200,208,220,.28),transparent 62%);pointer-events:none}
  html[data-theme="light"] .beam{background:radial-gradient(ellipse at top,rgba(120,128,150,.16),transparent 62%)}
  .hero-in{position:relative;z-index:2;padding-top:70px}
  .hero .r-big{font-family:var(--display);font-weight:700;font-size:clamp(72px,13vw,170px);line-height:.8;margin-bottom:6px}
  .hero .name{font-size:clamp(22px,4vw,34px);letter-spacing:.5em;font-weight:300;color:var(--hero-text);padding-left:.5em}
  .hero .sub{margin-top:10px;font-size:12px;letter-spacing:.42em;color:var(--hero-sub)}
  .hero h1{font-family:var(--display);font-weight:500;font-size:clamp(36px,6vw,82px);line-height:1.0;margin:36px auto 0;max-width:16ch;letter-spacing:-.02em}
  .hero h1 em{font-style:normal;color:var(--violet-lt)}
  html[data-theme="light"] .hero h1 em{color:var(--violet)}
  .hero .tag{margin-top:26px;font-size:13px;letter-spacing:.28em;color:var(--text-dim)}
  .hero .tag b{color:var(--violet-lt);font-weight:600}
  html[data-theme="light"] .hero .tag b{color:var(--violet)}
  .hero-cta{margin-top:40px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;text-decoration:none;font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:15px 34px;border-radius:2px;transition:all .25s;cursor:pointer;border:1px solid transparent}
  .btn-solid{background:var(--text);color:var(--bg)}
  .btn-solid:hover{transform:translateY(-2px);opacity:.9}
  .btn-ghost{border-color:var(--text);color:var(--text)}
  .btn-ghost:hover{background:var(--text);color:var(--bg)}
  .scroll-c{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;font-size:10px;letter-spacing:.3em;color:var(--text-soft);text-transform:uppercase}

  /* ===== FEATURE ===== */
  .feature{background:var(--sec-dark-bg);color:var(--sec-dark-text);padding:100px 0;overflow:hidden}
  .feature-in{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
  .feature-photo{position:relative;display:flex;justify-content:center}
  .feature-photo .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:360px;height:360px;border-radius:50%;border:1px solid var(--card-line)}
  .feature-photo img{position:relative;z-index:2;max-height:440px;filter:drop-shadow(0 30px 50px rgba(0,0,0,.35))}
  .feature-txt .eyebrow{color:var(--violet-lt)}
  html[data-theme="light"] .feature-txt .eyebrow{color:var(--violet)}
  .feature-txt h2{font-family:var(--display);font-weight:600;font-size:clamp(40px,6vw,72px);line-height:.95;margin:8px 0 6px}
  .feature-txt .dac{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--sec-dark-dim);margin-bottom:22px}
  .feature-txt p{color:var(--sec-dark-dim);font-size:15px;max-width:44ch;margin-bottom:26px}
  .fspecs{display:flex;gap:14px;margin-bottom:30px}
  .fspecs .sp{border:1px solid var(--card-line);border-radius:3px;padding:12px 22px;text-align:center}
  .fspecs .sp .v{font-family:var(--display);font-size:26px;font-weight:600}
  .fspecs .sp .l{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--sec-dark-dim)}

  /* ===== BADGES ===== */
  .badges{background:var(--badge-bg);border-top:1px solid var(--badge-line);padding:26px 0}
  .badge-row{display:flex;justify-content:center;gap:0;flex-wrap:wrap}
  .badge{display:flex;align-items:center;gap:11px;padding:6px 34px;color:var(--badge-text);position:relative}
  .badge+.badge::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);height:26px;width:1px;background:var(--badge-line)}
  .badge svg{width:22px;height:22px;stroke:var(--badge-icon);fill:none;stroke-width:1.4}
  .badge span{font-size:11px;letter-spacing:.16em;text-transform:uppercase;line-height:1.35}

  /* ===== FUTURE ===== */
  .future{background:var(--bg2);padding:110px 0;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--violet);margin-bottom:22px}
  html[data-theme="dark"] .eyebrow{color:var(--violet-lt)}
  .future h2{font-family:var(--display);font-weight:600;font-size:clamp(44px,7vw,92px);line-height:.98;color:var(--text);letter-spacing:-.01em}
  .future .q{margin-top:24px;font-size:clamp(15px,2vw,19px);letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);font-weight:500}
  .future .q b{color:var(--text)}
  .hex-div{margin:34px auto;width:220px;height:1px;background:var(--card-line);position:relative}
  .hex-div::after{content:"\2B21";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg2);padding:0 12px;color:var(--text-soft);font-size:15px}
  .future p.lead{max-width:60ch;margin:0 auto;font-size:17px;color:var(--text-dim)}

  /* ===== SHOP (ruo-style) ===== */
  .shop{background:var(--bg);padding:110px 0}
  .sec-head{text-align:center;margin-bottom:44px}
  .sec-head h2{font-family:var(--display);font-weight:600;font-size:clamp(38px,5.5vw,64px);color:var(--text);line-height:1;margin-top:14px}
  .sec-head p{margin-top:16px;color:var(--text-dim);font-size:15px}
  .shop-tools{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:40px}
  .chip{border:1px solid var(--card-line);background:var(--bg);color:var(--text-dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:9px 18px;border-radius:20px;cursor:pointer;transition:all .2s}
  .chip:hover{border-color:var(--violet)}
  .chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 22px}
  /* ruo card: image tile with overlapping button, name+price BELOW tile */
  .card{display:flex;flex-direction:column}
  .tile{position:relative;background:var(--card);border-radius:14px;display:flex;flex-direction:column;align-items:center;padding:20px 18px;overflow:hidden;transition:transform .3s}
  .card:hover .tile{transform:translateY(-4px)}
  .flag{position:absolute;top:0;left:0;z-index:4;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 15px}
  .flag.sale{background:var(--red);color:#fff;border-radius:14px 0 12px 0}
  .flag.oos{background:#8b9098;color:#fff;left:0;right:0;text-align:center;border-radius:14px 14px 0 0;top:0}
  .flag.soon{background:var(--violet);color:#fff;left:0;right:0;text-align:center;border-radius:14px 14px 0 0}
  /* fixed-height image well so every product matches regardless of photo vs svg */
  .tile-img{height:220px;width:100%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative}
  .tile.blur .tile-img{filter:blur(7px) grayscale(.25);opacity:.6}
  .tile-img img{max-height:100%;max-width:82%;object-fit:contain;filter:drop-shadow(0 12px 16px rgba(40,44,52,.16))}
  .tile-img .vial{max-height:100%;filter:drop-shadow(0 12px 20px rgba(40,44,52,.25));transition:transform .3s,filter .3s}
  .tile:hover .vial{transform:translateY(-4px) scale(1.03);filter:drop-shadow(0 20px 28px rgba(40,44,52,.35))}
  html[data-theme="dark"] .tile-img .vial{filter:drop-shadow(0 8px 24px rgba(107,78,158,.25))}
  html[data-theme="dark"] .tile:hover .vial{filter:drop-shadow(0 16px 32px rgba(107,78,158,.45))}
  .act{width:100%;text-align:center;font-family:var(--sans);font-size:13px;letter-spacing:.02em;font-weight:600;padding:13px 10px;border-radius:10px;cursor:pointer;transition:all .2s;border:1.5px solid;background:var(--bg)}
  .act.cart{border-color:var(--red);color:var(--text)}
  .act.cart:hover{background:var(--red);color:#fff}
  .act.opts{border-color:var(--violet);color:var(--text)}
  .act.opts:hover{background:var(--violet);color:#fff}
  .act.notify{border-color:var(--violet);color:var(--violet)}
  html[data-theme="dark"] .act.notify{color:var(--violet-lt)}
  .act.notify:hover{background:var(--violet);color:#fff}
  .act.added{background:var(--green);border-color:var(--green);color:#fff}
  .card-meta{padding-top:16px}
  .card-meta .cat{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet);margin-bottom:5px}
  html[data-theme="dark"] .card-meta .cat{color:var(--violet-lt)}
  .card-meta h3{font-size:17px;font-weight:600;color:var(--text);line-height:1.25}
  .card-meta .mg{font-size:12px;color:var(--text-soft);margin-top:1px}
  .card-meta .price{font-size:22px;font-weight:700;color:var(--text);margin-top:8px}
  .card-meta .price .old{font-size:15px;font-weight:400;color:var(--text-soft);text-decoration:line-through;margin-right:8px}
  .card-meta .price .range{font-size:18px}

  /* ===== PROCESS ===== */
  .process{background:var(--sec-dark-bg);color:var(--sec-dark-text);padding:110px 0}
  .process .sec-head h2{color:var(--sec-dark-text)}
  .process .sec-head .eyebrow{color:var(--sec-dark-dim)}
  .process .sec-head p{color:var(--sec-dark-dim);letter-spacing:.14em;text-transform:uppercase;font-size:12px}
  .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--step-line);border:1px solid var(--step-line);border-radius:6px;overflow:hidden}
  .step{background:var(--step-bg);padding:34px 22px}
  .step .num{font-family:var(--display);font-size:40px;font-weight:600;color:var(--step-num);line-height:1}
  .step .st-t{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet-lt);margin:6px 0 16px;font-weight:600}
  html[data-theme="light"] .step .st-t{color:var(--violet)}
  .step .ic{width:38px;height:38px;border-radius:50%;border:1px solid var(--step-line);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .step .ic svg{width:18px;height:18px;stroke:var(--sec-dark-dim);fill:none;stroke-width:1.4}
  .step p{font-size:13px;color:var(--sec-dark-dim);line-height:1.55}
  .quote{margin-top:48px;text-align:center}
  .quote .qt{font-family:var(--display);font-size:clamp(20px,3vw,30px);font-weight:500;color:var(--sec-dark-text);max-width:26ch;margin:0 auto;line-height:1.25}
  .quote .qt b{color:var(--violet-lt)}
  html[data-theme="light"] .quote .qt b{color:var(--violet)}

  /* ===== INQUIRE ===== */
  .inquire{background:var(--bg2);padding:110px 0;text-align:center}
  .inquire h2{font-family:var(--display);font-weight:600;font-size:clamp(40px,6vw,74px);color:var(--text);line-height:1}
  .inquire p{max-width:52ch;margin:20px auto 36px;color:var(--text-dim);font-size:16px}
  .form{max-width:560px;margin:0 auto;text-align:left}
  .form .row{display:flex;gap:14px;flex-wrap:wrap}
  .form .fld{flex:1;min-width:200px;margin-bottom:14px}
  .form label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-soft);margin-bottom:7px}
  .form input,.form textarea{width:100%;padding:13px 15px;border:1px solid var(--card-line);border-radius:3px;background:var(--bg);font-family:var(--sans);font-size:14px;color:var(--text);transition:border .2s}
  .form input:focus,.form textarea:focus{outline:none;border-color:var(--violet)}
  .form textarea{resize:vertical;min-height:96px}
  .form .btn-solid{width:100%;margin-top:6px}
  .form .note{margin-top:14px;font-size:11px;color:var(--text-soft);text-align:center;letter-spacing:.04em}

  /* ===== FOOTER ===== */
  footer{background:var(--foot-bg);color:var(--foot-text);padding:64px 0 34px;border-top:1px solid var(--foot-line)}
  .foot-top{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;padding-bottom:40px;border-bottom:1px solid var(--foot-line)}
  .foot-brand .r{font-family:var(--display);font-size:34px;font-weight:700}
  .foot-brand .nm{letter-spacing:.36em;font-size:13px;color:var(--foot-head);margin-top:2px}
  .foot-brand .tg{font-size:11px;letter-spacing:.28em;color:var(--text-soft);margin-top:14px}
  .foot-cols{display:flex;gap:64px;flex-wrap:wrap}
  .foot-col h4{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--foot-head);margin-bottom:16px}
  .foot-col a{display:block;color:var(--foot-text);text-decoration:none;font-size:13px;margin-bottom:10px;transition:color .2s;cursor:pointer}
  .foot-col a:hover{color:var(--text)}
  .disclaimer{margin-top:34px;padding:22px;border:1px solid var(--foot-line);border-radius:4px}
  .disclaimer p{font-size:11.5px;line-height:1.7;color:var(--text-soft);letter-spacing:.02em;margin-bottom:10px}
  .disclaimer p:last-child{margin-bottom:0}
  .disclaimer b{color:var(--foot-text);letter-spacing:.08em}
  .foot-btm{margin-top:30px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:11px;letter-spacing:.1em;color:var(--text-soft)}

  /* ===== CART DRAWER ===== */
  .cart-ov{position:fixed;inset:0;z-index:200;background:rgba(6,7,8,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .3s}
  .cart-ov.open{opacity:1;pointer-events:auto}
  .cart-dr{position:fixed;top:0;right:0;bottom:0;z-index:201;width:380px;max-width:88vw;background:var(--bg);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--card-line)}
  .cart-dr.open{transform:none}
  .cart-hd{padding:24px;border-bottom:1px solid var(--card-line);display:flex;justify-content:space-between;align-items:center}
  .cart-hd h3{font-family:var(--display);font-size:24px;font-weight:600;color:var(--text)}
  .cart-hd button{background:none;border:0;font-size:24px;cursor:pointer;color:var(--text-soft);line-height:1}
  .cart-items{flex:1;overflow-y:auto;padding:16px 24px}
  .cart-empty{text-align:center;color:var(--text-soft);font-size:14px;margin-top:60px}
  .ci{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--card-line)}
  .ci .n{font-size:14px;font-weight:500;color:var(--text)}
  .ci .m{font-size:11px;color:var(--text-soft)}
  .ci .p{font-weight:600;color:var(--text)}
  .ci .rm{background:none;border:0;color:var(--red);font-size:12px;cursor:pointer;margin-left:10px}
  .cart-ft{padding:24px;border-top:1px solid var(--card-line)}
  .cart-tot{display:flex;justify-content:space-between;font-weight:700;font-size:17px;margin-bottom:16px;color:var(--text)}
  .cart-ft .btn-solid{width:100%;text-align:center}
  .cart-ft .cnote{font-size:10px;color:var(--text-soft);text-align:center;margin-top:12px;letter-spacing:.04em}

  /* ===== MODAL (policies) ===== */
  .modal-ov{position:fixed;inset:0;z-index:300;background:rgba(6,7,8,.6);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px}
  .modal-ov.open{display:flex}
  .modal{background:var(--bg);color:var(--text);max-width:640px;width:100%;max-height:82vh;overflow-y:auto;border-radius:10px;border:1px solid var(--card-line);padding:40px}
  .modal h3{font-family:var(--display);font-size:30px;font-weight:600;margin-bottom:6px}
  .modal .m-sub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--violet);margin-bottom:20px}
  html[data-theme="dark"] .modal .m-sub{color:var(--violet-lt)}
  .modal p{font-size:13.5px;line-height:1.7;color:var(--text-dim);margin-bottom:14px}
  .modal p b{color:var(--text)}
  .modal .m-close{margin-top:14px;background:var(--text);color:var(--bg);border:0;font-family:var(--sans);font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:13px 28px;border-radius:3px;cursor:pointer}

  .rv{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
  @media(max-width:820px){.rv{opacity:1!important;transform:none!important;transition:none}}
  .rv.in{opacity:1;transform:none}

  @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}

  /* ===== TABLET ===== */
  @media(max-width:820px){
    .nav-links{display:none}
    .burger{display:block}
    .feature-in{grid-template-columns:1fr;gap:36px}
    .feature-photo{order:-1}
    .feature-photo img{max-height:340px}
    .feature-photo .ring{width:280px;height:280px}
    section{padding-left:0;padding-right:0}
    .future,.shop,.process,.inquire,.feature{padding-top:80px;padding-bottom:80px}
  }

  /* ===== MOBILE ===== */
  @media(max-width:620px){
    .wrap{padding:0 18px}
    .grid{grid-template-columns:repeat(2,1fr);gap:30px 14px}
    .steps{grid-template-columns:1fr}
    /* keep tiles compact on phones */
    .tile{border-radius:12px;padding:16px 12px}
    .tile-img{height:150px;margin-bottom:12px}
    .tile-img img{max-width:78%}
    .act{font-size:12px;padding:11px 6px;border-radius:9px;letter-spacing:0}
    .card-meta{padding-top:12px}
    .card-meta h3{font-size:14px}
    .card-meta .mg{font-size:11px}
    .card-meta .price{font-size:18px;margin-top:6px}
    .flag{font-size:9px;padding:6px 10px}
    /* nav: drop the EN/ES + theme into the drawer, keep it clean */
    .nav-right{gap:14px}
    .badge{padding:6px 12px}
    .badge+.badge::before{display:none}
    .badge span{font-size:10px;letter-spacing:.1em}
    .foot-top{flex-direction:column;gap:30px}
    .foot-cols{gap:36px}
    .gate-card{padding:36px 24px}
    .gate-card h2{font-size:27px}
    .modal{padding:28px 22px}
    .hero h1{font-size:clamp(32px,9vw,52px)}
    .future h2{font-size:clamp(38px,11vw,60px)}
    .cart-dr{width:100%;max-width:100%}
    .fspecs{flex-wrap:wrap;gap:10px}
    .fspecs .sp{flex:1;min-width:80px;padding:10px 14px}
  }

  /* very small phones */
  @media(max-width:360px){
    .grid{gap:26px 10px}
    .act{font-size:10px}
    .card-meta h3{font-size:13px}
  }

  /* ===== MOBILE NAV DRAWER ===== */
  .m-menu{display:none;position:fixed;top:0;right:0;bottom:0;z-index:150;width:260px;max-width:80vw;
    background:var(--bg);border-left:1px solid var(--card-line);transform:translateX(100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);padding:80px 26px 26px;flex-direction:column;gap:4px}
  .m-menu.open{display:flex;transform:none}
  .m-menu a{color:var(--text);text-decoration:none;font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:14px 0;border-bottom:1px solid var(--card-line);cursor:pointer}
  .m-menu .m-row{display:flex;gap:10px;align-items:center;margin-top:22px}
  .m-menu .m-close-x{position:absolute;top:22px;right:22px;background:none;border:0;font-size:26px;color:var(--text-soft);cursor:pointer;line-height:1}
  .m-ov{display:none;position:fixed;inset:0;z-index:149;background:rgba(6,7,8,.5)}
  .m-ov.open{display:block}

  @media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}}
</style>
</head>

function vial(accent){
  var id="v"+accent.replace(/[#]/g,"");
  // Determine if dark context for liquid color blending
  var isDark=document.documentElement.getAttribute("data-theme")==="dark";
  var glassOpacity=isDark?"0.06":"0.12";
  var glassStroke=isDark?"rgba(255,255,255,0.18)":"rgba(180,185,195,0.8)";
  var capTop=isDark?"#3a3d44":"#d8dbe0";
  var capBot=isDark?"#22242a":"#b4b9c0";
  var bodyStart=isDark?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.85)";
  var bodyMid=isDark?"rgba(255,255,255,0.03)":"rgba(220,224,230,0.5)";
  var shineColor=isDark?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.9)";
  var labelBg=isDark?"rgba(14,15,18,0.92)":"rgba(248,249,251,0.96)";
  var labelText=isDark?"#e2e4e8":"#2a2d33";
  var labelSub=isDark?"#6a7078":"#8b9098";
  var labelLine=isDark?"rgba(255,255,255,0.08)":"rgba(10,11,13,0.10)";
  var r=document.createElement("canvas"); // trick to get a unique id
  return `<svg class="vial" width="76" height="170" viewBox="0 0 76 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cap_${id}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="${capTop}"/>
      <stop offset="45%" stop-color="${capBot}"/>
      <stop offset="55%" stop-color="${capTop}"/>
      <stop offset="100%" stop-color="${capBot}"/>
    </linearGradient>
    <linearGradient id="body_${id}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="${bodyStart}"/>
      <stop offset="40%" stop-color="${bodyMid}"/>
      <stop offset="100%" stop-color="${bodyStart}"/>
    </linearGradient>
    <linearGradient id="liq_${id}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="${accent}" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="${accent}" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="shine_${id}" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="${shineColor}" stop-opacity="1"/>
      <stop offset="100%" stop-color="${shineColor}" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip_${id}">
      <path d="M18 32 h40 a5 5 0 0 1 5 5 v118 a10 10 0 0 1 -10 10 h-30 a10 10 0 0 1 -10 -10 v-118 a5 5 0 0 1 5 -5 z"/>
    </clipPath>
    <filter id="glow_${id}" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Cap top (stopper) -->
  <rect x="26" y="4" width="24" height="8" rx="2.5" fill="url(#cap_${id})" stroke="${glassStroke}" stroke-width="0.5"/>
  <!-- Cap neck -->
  <rect x="22" y="11" width="32" height="22" rx="2" fill="url(#cap_${id})" stroke="${glassStroke}" stroke-width="0.5"/>
  <!-- Cap crimp line -->
  <line x1="22" y1="22" x2="54" y2="22" stroke="${labelLine}" stroke-width="1"/>
  <line x1="22" y1="27" x2="54" y2="27" stroke="${labelLine}" stroke-width="0.5"/>

  <!-- Glass body -->
  <path d="M18 32 h40 a5 5 0 0 1 5 5 v118 a10 10 0 0 1 -10 10 h-30 a10 10 0 0 1 -10 -10 v-118 a5 5 0 0 1 5 -5 z"
    fill="url(#body_${id})" stroke="${glassStroke}" stroke-width="1"/>

  <!-- Liquid fill (inside glass) -->
  <g clip-path="url(#clip_${id})">
    <rect x="18" y="90" width="40" height="75" fill="url(#liq_${id})"/>
    <!-- Liquid surface wave -->
    <path d="M18 90 q10-4 20 0 q10 4 20 0" fill="${accent}" fill-opacity="0.7" stroke="none"/>
    <!-- Liquid glow at surface -->
    <ellipse cx="38" cy="90" rx="15" ry="3" fill="${accent}" fill-opacity="0.4" filter="url(#glow_${id})"/>
  </g>

  <!-- Glass shine left edge -->
  <path d="M20 38 v100" stroke="url(#shine_${id})" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Glass shine right edge (subtle) -->
  <path d="M56 42 v80" stroke="url(#shine_${id})" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <!-- Label area -->
  <rect x="20" y="60" width="36" height="52" rx="2.5" fill="${labelBg}" stroke="${labelLine}" stroke-width="0.8"/>
  <!-- Label top color band -->
  <rect x="20" y="60" width="36" height="6" rx="2.5" fill="${accent}" fill-opacity="0.85"/>
  <!-- Label text: R -->
  <text x="38" y="84" text-anchor="middle" font-family="Cormorant Garamond,Georgia,serif" font-size="18" font-weight="700" fill="${labelText}">R</text>
  <!-- Label text: REVORA -->
  <text x="38" y="96" text-anchor="middle" font-family="Inter,sans-serif" font-size="5" letter-spacing="2" fill="${labelSub}">REVORA</text>
  <!-- Label divider -->
  <line x1="23" y1="100" x2="53" y2="100" stroke="${labelLine}" stroke-width="0.8"/>
  <!-- Label: 99% PURITY -->
  <text x="38" y="108" text-anchor="middle" font-family="Inter,sans-serif" font-size="4.5" letter-spacing="1.5" fill="${accent}" font-weight="600">99% PURITY</text>

  <!-- Measurement lines on glass -->
  <line x1="58" y1="95" x2="62" y2="95" stroke="${labelSub}" stroke-width="0.7" opacity="0.5"/>
  <line x1="59" y1="105" x2="62" y2="105" stroke="${labelSub}" stroke-width="0.7" opacity="0.4"/>
  <line x1="59" y1="115" x2="62" y2="115" stroke="${labelSub}" stroke-width="0.7" opacity="0.4"/>
  <line x1="58" y1="125" x2="62" y2="125" stroke="${labelSub}" stroke-width="0.7" opacity="0.5"/>

  <!-- Drop shadow ellipse at bottom -->
  <ellipse cx="38" cy="167" rx="18" ry="3" fill="${accent}" fill-opacity="0.12"/>
</svg>`;
}
