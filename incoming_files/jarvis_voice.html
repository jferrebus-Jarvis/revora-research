<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jarvis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .status {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 60px;
    height: 20px;
    transition: color 0.3s;
  }

  .status.active { color: #00d4ff; }
  .status.thinking { color: #ffd700; }
  .status.speaking { color: #00ff88; }
  .status.error { color: #ff4444; }
  .status.standby { color: rgba(255,255,255,0.25); }

  .orb-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 60px;
  }

  .orb {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a6fff, #0033aa 60%, #000055);
    box-shadow:
      0 0 40px rgba(0, 100, 255, 0.4),
      0 0 80px rgba(0, 100, 255, 0.2),
      inset 0 0 40px rgba(255,255,255,0.05);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.4s ease, box-shadow 0.4s ease;
    position: relative;
    z-index: 2;
  }

  .orb::after {
    content: '';
    position: absolute;
    top: 20%; left: 25%;
    width: 30%; height: 20%;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    filter: blur(8px);
  }

  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(0, 150, 255, 0.3);
    opacity: 0;
    pointer-events: none;
  }

  .ring-1 { width: 220px; height: 220px; }
  .ring-2 { width: 260px; height: 260px; }
  .ring-3 { width: 300px; height: 300px; }

  body.active .ring-1 { animation: pulse 1.8s ease-out infinite; }
  body.active .ring-2 { animation: pulse 1.8s ease-out 0.3s infinite; }
  body.active .ring-3 { animation: pulse 1.8s ease-out 0.6s infinite; }

  body.speaking .orb {
    animation: orbPulse 0.6s ease-in-out infinite alternate;
    background: radial-gradient(circle at 35% 35%, #00ff88, #009944 60%, #003322);
    box-shadow: 0 0 60px rgba(0, 255, 136, 0.6), 0 0 120px rgba(0, 255, 136, 0.3), inset 0 0 40px rgba(255,255,255,0.05);
  }

  body.thinking .orb {
    animation: orbSpin 2s linear infinite;
    background: radial-gradient(circle at 35% 35%, #ffd700, #aa7700 60%, #332200);
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.5), 0 0 80px rgba(255, 215, 0, 0.2), inset 0 0 40px rgba(255,255,255,0.05);
  }

  body.standby .orb {
    background: radial-gradient(circle at 35% 35%, #223366, #001133 60%, #000011);
    box-shadow: 0 0 20px rgba(0, 50, 150, 0.2), inset 0 0 20px rgba(255,255,255,0.02);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.15); }
  }

  @keyframes orbPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
  }

  @keyframes orbSpin {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.02); }
  }

  .mic-icon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .transcript {
    max-width: 320px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 20px;
  }

  .user-text {
    font-size: 15px;
    color: rgba(255,255,255,0.45);
    font-style: italic;
  }

  .jarvis-text {
    font-size: 16px;
    color: #fff;
    line-height: 1.5;
  }

  .hint {
    position: fixed;
    bottom: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    padding: 0 20px;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.8);
  }

  .model-badge {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }

  /* Start button overlay */
  .start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .start-overlay.hidden { display: none; }

  .start-text {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .start-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(0, 150, 255, 0.6);
    background: rgba(0, 80, 255, 0.15);
    color: #fff;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .start-btn:hover, .start-btn:active {
    background: rgba(0, 80, 255, 0.4);
    border-color: rgba(0, 150, 255, 1);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">JARVIS</div>
  <div class="model-badge">JF Web Studios</div>
</div>

<!-- One-time start overlay to get mic permission -->
<div class="start-overlay" id="startOverlay">
  <div class="start-text">Tap to activate</div>
  <button class="start-btn" id="startBtn">Start</button>
  <div class="start-text" style="font-size:11px; margin-top:-12px;">Microphone access required</div>
</div>

<div class="status standby" id="status">Standby</div>

<div class="orb-container" id="orbContainer">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="orb" id="orb">
    <svg class="mic-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(255,255,255,0.8)"/>
      <path d="M5 10a7 7 0 0 0 14 0" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="17" x2="12" y2="21" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="21" x2="15" y2="21" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="transcript">
  <div class="user-text" id="userText"></div>
  <div class="jarvis-text" id="jarvisText"></div>
</div>

<div class="hint" id="hint">Always listening — just speak</div>

<script>
const TTS_URL = "https://api.base44.com/api/apps/6a3581bb2a25b2dfe23bf70e/functions/jarvisVoice";

const orb = document.getElementById('orb');
const statusEl = document.getElementById('status');
const userText = document.getElementById('userText');
const jarvisText = document.getElementById('jarvisText');
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const body = document.body;

let recognition = null;
let isSpeaking = false;
let isThinking = false;
let conversationHistory = [];
let restartTimeout = null;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function setStatus(text, state = '') {
  statusEl.textContent = text;
  statusEl.className = 'status ' + state;
  body.className = state;
}

// ── TTS ───────────────────────────────────────────────────────────────────────
async function speak(text) {
  isSpeaking = true;
  setStatus('Speaking...', 'speaking');
  jarvisText.textContent = text;

  // Stop listening while speaking
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
  }

  try {
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!res.ok) throw new Error('TTS failed');

    const blob = await res.blob();
    const audioUrl = URL.createObjectURL(blob);
    const audio = new Audio(audioUrl);

    await new Promise((resolve) => {
      audio.onended = () => {
        URL.revokeObjectURL(audioUrl);
        resolve();
      };
      audio.onerror = resolve;
      audio.play().catch(resolve);
    });

  } catch (err) {
    // Browser TTS fallback
    await new Promise((resolve) => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      utterance.pitch = 0.8;
      utterance.onend = resolve;
      utterance.onerror = resolve;
      speechSynthesis.speak(utterance);
    });
  }

  isSpeaking = false;
  // Resume listening
  setTimeout(() => startListening(), 300);
}

// ── AGENT ────────────────────────────────────────────────────────────────────
async function askJarvis(userMessage) {
  isThinking = true;
  setStatus('Thinking...', 'thinking');
  userText.textContent = '"' + userMessage + '"';
  jarvisText.textContent = '';
  conversationHistory.push({ role: 'user', content: userMessage });

  let reply = '';

  try {
    const res = await fetch(
      `https://api.base44.com/api/apps/6a3581bb2a25b2dfe23bf70e/superagent/message`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userMessage, history: conversationHistory.slice(-10) })
      }
    );
    if (res.ok) {
      const data = await res.json();
      reply = data.message || data.reply || data.response || '';
    }
  } catch(e) {}

  if (!reply) reply = getFallback(userMessage);

  conversationHistory.push({ role: 'assistant', content: reply });
  isThinking = false;
  await speak(reply);
}

function getFallback(msg) {
  const m = msg.toLowerCase();
  if (m.includes('time')) return 'It is ' + new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  if (/hello|hey|what'?s up|yo/.test(m)) return 'Online and ready. What do you need?';
  if (m.includes('your name') || m.includes('who are you')) return 'I am Jarvis. Your personal AI built by J F Web Studios.';
  if (m.includes('weather')) return 'I need a live connection for that. Check back in a moment.';
  return 'Understood. I am processing that now.';
}

// ── ALWAYS-ON LISTENING ───────────────────────────────────────────────────────
function startListening() {
  if (isSpeaking || isThinking) return;
  if (!SpeechRecognition) {
    setStatus('Browser not supported', 'error');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;       // auto-stops after silence
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    if (!isSpeaking && !isThinking) setStatus('Listening...', 'active');
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript.trim();
    if (transcript) askJarvis(transcript);
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      // Normal — just restart
      scheduleRestart();
    } else if (event.error === 'not-allowed') {
      setStatus('Microphone denied', 'error');
    } else {
      scheduleRestart();
    }
  };

  recognition.onend = () => {
    if (!isSpeaking && !isThinking) {
      setStatus('Listening...', 'active');
      scheduleRestart();
    }
  };

  try {
    recognition.start();
  } catch(e) {
    scheduleRestart();
  }
}

function scheduleRestart() {
  clearTimeout(restartTimeout);
  restartTimeout = setTimeout(() => {
    if (!isSpeaking && !isThinking) startListening();
  }, 300);
}

// ── TAP ORB TO INTERRUPT ──────────────────────────────────────────────────────
orb.addEventListener('click', () => {
  if (isSpeaking) {
    // Interrupt and go back to listening
    speechSynthesis.cancel();
    isSpeaking = false;
    setStatus('Listening...', 'active');
    startListening();
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startOverlay.classList.add('hidden');
  setStatus('Listening...', 'active');
  startListening();
});
</script>
</body>
</html>
