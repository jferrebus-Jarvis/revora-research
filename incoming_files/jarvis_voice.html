<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jarvis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .status {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 60px;
    height: 20px;
    transition: color 0.3s;
  }
  .status.active   { color: #00d4ff; }
  .status.thinking { color: #ffd700; }
  .status.speaking { color: #00ff88; }
  .status.error    { color: #ff4444; }
  .status.standby  { color: rgba(255,255,255,0.2); }
  .status.wake     { color: #ffffff; letter-spacing: 3px; }

  .orb-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 60px;
  }

  .orb {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a6fff, #0033aa 60%, #000055);
    box-shadow: 0 0 40px rgba(0,100,255,0.4), 0 0 80px rgba(0,100,255,0.2), inset 0 0 40px rgba(255,255,255,0.05);
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: background 0.5s ease, box-shadow 0.5s ease;
  }

  .orb::after {
    content: '';
    position: absolute;
    top: 20%; left: 25%;
    width: 30%; height: 20%;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    filter: blur(8px);
  }

  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    border: 1px solid rgba(0,150,255,0.3);
    opacity: 0;
    pointer-events: none;
  }
  .ring-1 { width: 220px; height: 220px; }
  .ring-2 { width: 260px; height: 260px; }
  .ring-3 { width: 300px; height: 300px; }

  body.active .ring-1 { animation: pulse 1.8s ease-out infinite; }
  body.active .ring-2 { animation: pulse 1.8s ease-out 0.3s infinite; }
  body.active .ring-3 { animation: pulse 1.8s ease-out 0.6s infinite; }

  body.wake .ring-1 { animation: pulse 1s ease-out infinite; border-color: rgba(255,255,255,0.6); }
  body.wake .ring-2 { animation: pulse 1s ease-out 0.2s infinite; border-color: rgba(255,255,255,0.4); }
  body.wake .ring-3 { animation: pulse 1s ease-out 0.4s infinite; border-color: rgba(255,255,255,0.2); }

  body.wake .orb {
    background: radial-gradient(circle at 35% 35%, #88ccff, #2266cc 60%, #001144);
    box-shadow: 0 0 80px rgba(100,180,255,0.9), 0 0 160px rgba(100,180,255,0.5), inset 0 0 40px rgba(255,255,255,0.2);
    animation: wakeGlow 0.8s ease-in-out infinite alternate;
  }

  body.speaking .orb {
    background: radial-gradient(circle at 35% 35%, #00ff88, #009944 60%, #003322);
    box-shadow: 0 0 60px rgba(0,255,136,0.6), 0 0 120px rgba(0,255,136,0.3);
    animation: orbPulse 0.5s ease-in-out infinite alternate;
  }

  body.thinking .orb {
    background: radial-gradient(circle at 35% 35%, #ffd700, #aa7700 60%, #332200);
    box-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
    animation: orbSpin 2s linear infinite;
  }

  body.standby .orb {
    background: radial-gradient(circle at 35% 35%, #223366, #001133 60%, #000011);
    box-shadow: 0 0 20px rgba(0,50,150,0.2);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%   { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.15); }
  }
  @keyframes orbPulse {
    0%   { transform: scale(1); }
    100% { transform: scale(1.06); }
  }
  @keyframes orbSpin {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }
  @keyframes breathe {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%     { opacity: 0.8; transform: scale(1.02); }
  }
  @keyframes wakeGlow {
    0%   { box-shadow: 0 0 60px rgba(100,180,255,0.7), 0 0 120px rgba(100,180,255,0.3); }
    100% { box-shadow: 0 0 110px rgba(100,180,255,1), 0 0 220px rgba(100,180,255,0.7); }
  }

  .mic-icon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 3;
    pointer-events: none;
  }

  .transcript {
    max-width: 320px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .user-text   { font-size: 14px; color: rgba(255,255,255,0.38); font-style: italic; line-height: 1.5; }
  .jarvis-text { font-size: 16px; color: #fff; line-height: 1.65; font-weight: 300; }

  .hint {
    position: fixed;
    bottom: 40px;
    font-size: 11px;
    color: rgba(255,255,255,0.16);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    padding: 0 20px;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo        { font-size: 18px; font-weight: 700; letter-spacing: 5px; color: rgba(255,255,255,0.85); }
  .model-badge { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }

  /* Start overlay */
  .start-overlay {
    position: fixed; inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 100;
  }
  .start-overlay.hidden { display: none; }

  .start-logo  { font-size: 28px; font-weight: 700; letter-spacing: 8px; color: #fff; margin-bottom: 8px; }
  .start-sub   { font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; text-align: center; line-height: 2; }

  .start-btn {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,150,255,0.5);
    background: rgba(0,60,200,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .start-btn:active {
    background: rgba(0,80,255,0.35);
    border-color: rgba(0,150,255,1);
    transform: scale(0.95);
  }
</style>
</head>
<body class="standby">

<div class="topbar">
  <div class="logo">JARVIS</div>
  <div class="model-badge">JF Web Studios</div>
</div>

<div class="start-overlay" id="startOverlay">
  <div class="start-logo">JARVIS</div>
  <div class="start-sub">Say "Hey Jarvis, wake up"<br>to activate at any time</div>
  <button class="start-btn" id="startBtn">Start</button>
  <div class="start-sub" style="font-size:11px; margin-top:-10px; color:rgba(255,255,255,0.2)">Microphone required</div>
</div>

<div class="status standby" id="status">Standby</div>

<div class="orb-container">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="orb" id="orb">
    <svg class="mic-icon" width="46" height="46" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(255,255,255,0.75)"/>
      <path d="M5 10a7 7 0 0 0 14 0" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="17" x2="12" y2="21" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="21" x2="15" y2="21" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="transcript">
  <div class="user-text"  id="userText"></div>
  <div class="jarvis-text" id="jarvisText"></div>
</div>

<div class="hint">Say "Hey Jarvis, wake up" · Tap orb to interrupt</div>

<script>
const BRAIN_URL = "https://superagent-e23bf70e.base44.app/functions/jarvisBrain";
const TTS_URL   = "https://superagent-e23bf70e.base44.app/functions/jarvisVoice";

// Iron Man wake line — exact
const WAKE_RESPONSE  = "Good evening, Mr. Stark. All systems are online. Welcome home.";
const SLEEP_RESPONSE = "Of course. Standing by. I'll be here when you need me.";

const WAKE_PHRASES  = ['hey jarvis', 'jarvis wake up', 'hey jarvis wake up', 'wake up jarvis', 'wake up'];
const SLEEP_PHRASES = ['go to sleep', 'sleep jarvis', 'jarvis sleep', 'goodbye jarvis', 'shut down', 'power down'];

const orb          = document.getElementById('orb');
const statusEl     = document.getElementById('status');
const userTextEl   = document.getElementById('userText');
const jarvisTextEl = document.getElementById('jarvisText');
const startOverlay = document.getElementById('startOverlay');
const startBtn     = document.getElementById('startBtn');

let recognition       = null;
let isSpeaking        = false;
let isThinking        = false;
let isAwake           = false;
let restartTimeout    = null;
let currentAudio      = null;
let conversationHistory = [];

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function setStatus(text, state = '') {
  statusEl.textContent    = text;
  statusEl.className      = 'status ' + state;
  document.body.className = state;
}

function isWakeWord(t)  { return WAKE_PHRASES.some(w  => t.toLowerCase().includes(w)); }
function isSleepWord(t) { return SLEEP_PHRASES.some(w => t.toLowerCase().includes(w)); }

// ── TTS ───────────────────────────────────────────────────────────────────────
async function speak(text) {
  isSpeaking = true;
  setStatus('Speaking...', 'speaking');
  jarvisTextEl.textContent = text;
  if (recognition) { try { recognition.abort(); } catch(e) {} }

  try {
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) throw new Error('TTS fail');
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    await new Promise(resolve => {
      currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      currentAudio.onerror = resolve;
      currentAudio.play().catch(resolve);
    });
  } catch(e) {
    // Browser TTS fallback
    await new Promise(resolve => {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.88; u.pitch = 0.75;
      const voices = speechSynthesis.getVoices();
      const deep = voices.find(v =>
        v.name.includes('Daniel') ||
        v.name.includes('Google UK English Male') ||
        v.name.includes('Alex') ||
        (v.lang === 'en-GB' && v.name.toLowerCase().includes('male'))
      );
      if (deep) u.voice = deep;
      u.onend = resolve; u.onerror = resolve;
      speechSynthesis.speak(u);
    });
  }

  isSpeaking   = false;
  currentAudio = null;
  setTimeout(() => startListening(), 350);
}

// ── BRAIN ─────────────────────────────────────────────────────────────────────
async function askJarvis(userMessage) {
  isThinking = true;
  setStatus('Thinking...', 'thinking');
  userTextEl.textContent   = '\u201c' + userMessage + '\u201d';
  jarvisTextEl.textContent = '';
  conversationHistory.push({ role: 'user', content: userMessage });

  let reply = '';
  try {
    const res = await fetch(BRAIN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMessage, history: conversationHistory.slice(-8) })
    });
    if (res.ok) {
      const d = await res.json();
      reply = d.reply || '';
    }
  } catch(e) {}

  if (!reply) {
    const m = userMessage.toLowerCase();
    const t = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', timeZone:'America/Chicago'});
    if (m.includes('time')) reply = 'It is ' + t + ', Central Time.';
    else reply = 'I am processing that. Give me just a moment.';
  }

  // Strip any accidental markdown
  reply = reply.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/#{1,6} /g,'').replace(/\n+/g,'. ').trim();

  conversationHistory.push({ role: 'assistant', content: reply });
  isThinking = false;
  await speak(reply);
}

// ── ALWAYS-ON LISTEN ──────────────────────────────────────────────────────────
function startListening() {
  if (isSpeaking || isThinking || !SR) return;

  recognition = new SR();
  recognition.lang           = 'en-US';
  recognition.continuous     = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    if (!isSpeaking && !isThinking) {
      setStatus(isAwake ? 'Listening...' : 'Standby \u2014 say "Hey Jarvis"', isAwake ? 'active' : 'standby');
    }
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript.trim();
    if (!isAwake) {
      if (isWakeWord(transcript)) {
        isAwake = true;
        userTextEl.textContent = '\u201c' + transcript + '\u201d';
        setStatus('Waking up...', 'wake');
        speak(WAKE_RESPONSE);
      } else {
        scheduleRestart();
      }
    } else {
      if (isSleepWord(transcript)) {
        isAwake = false;
        userTextEl.textContent = '\u201c' + transcript + '\u201d';
        speak(SLEEP_RESPONSE).then(() => {
          userTextEl.textContent   = '';
          jarvisTextEl.textContent = '';
        });
      } else {
        askJarvis(transcript);
      }
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') console.warn('SR error:', e.error);
    if (e.error === 'not-allowed') { setStatus('Mic denied', 'error'); return; }
    scheduleRestart();
  };

  recognition.onend = () => {
    if (!isSpeaking && !isThinking) scheduleRestart();
  };

  try { recognition.start(); } catch(e) { scheduleRestart(); }
}

function scheduleRestart() {
  clearTimeout(restartTimeout);
  restartTimeout = setTimeout(() => {
    if (!isSpeaking && !isThinking) startListening();
  }, 400);
}

// ── TAP ORB = INTERRUPT ───────────────────────────────────────────────────────
orb.addEventListener('click', () => {
  if (isSpeaking) {
    speechSynthesis.cancel();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    isSpeaking = false;
    setTimeout(() => startListening(), 200);
  }
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  startOverlay.classList.add('hidden');
  setStatus('Standby \u2014 say "Hey Jarvis"', 'standby');
  startListening();
});
</script>
</body>
</html>
