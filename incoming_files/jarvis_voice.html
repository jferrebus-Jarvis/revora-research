<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jarvis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .status {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 60px;
    height: 20px;
    transition: color 0.3s;
  }

  .status.active { color: #00d4ff; }
  .status.thinking { color: #ffd700; }
  .status.speaking { color: #00ff88; }
  .status.error { color: #ff4444; }

  /* Orb */
  .orb-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 60px;
  }

  .orb {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a6fff, #0033aa 60%, #000055);
    box-shadow:
      0 0 40px rgba(0, 100, 255, 0.4),
      0 0 80px rgba(0, 100, 255, 0.2),
      inset 0 0 40px rgba(255,255,255,0.05);
    cursor: pointer;
    transition: transform 0.15s ease;
    position: relative;
    z-index: 2;
  }

  .orb::after {
    content: '';
    position: absolute;
    top: 20%;
    left: 25%;
    width: 30%;
    height: 20%;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    filter: blur(8px);
  }

  .orb:active { transform: scale(0.94); }

  /* Pulse rings when listening */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(0, 150, 255, 0.3);
    opacity: 0;
    pointer-events: none;
  }

  .ring-1 { width: 220px; height: 220px; }
  .ring-2 { width: 260px; height: 260px; }
  .ring-3 { width: 300px; height: 300px; }

  body.listening .ring-1 {
    animation: pulse 1.8s ease-out infinite;
  }
  body.listening .ring-2 {
    animation: pulse 1.8s ease-out 0.3s infinite;
  }
  body.listening .ring-3 {
    animation: pulse 1.8s ease-out 0.6s infinite;
  }

  body.speaking .orb {
    animation: orbPulse 0.6s ease-in-out infinite alternate;
    background: radial-gradient(circle at 35% 35%, #00ff88, #009944 60%, #003322);
    box-shadow:
      0 0 40px rgba(0, 255, 136, 0.5),
      0 0 80px rgba(0, 255, 136, 0.2),
      inset 0 0 40px rgba(255,255,255,0.05);
  }

  body.thinking .orb {
    animation: orbSpin 2s linear infinite;
    background: radial-gradient(circle at 35% 35%, #ffd700, #aa7700 60%, #332200);
    box-shadow:
      0 0 40px rgba(255, 215, 0, 0.5),
      0 0 80px rgba(255, 215, 0, 0.2),
      inset 0 0 40px rgba(255,255,255,0.05);
  }

  @keyframes pulse {
    0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.15); }
  }

  @keyframes orbPulse {
    0% { transform: scale(1); box-shadow: 0 0 40px rgba(0, 255, 136, 0.5), 0 0 80px rgba(0, 255, 136, 0.2); }
    100% { transform: scale(1.04); box-shadow: 0 0 60px rgba(0, 255, 136, 0.8), 0 0 120px rgba(0, 255, 136, 0.4); }
  }

  @keyframes orbSpin {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  /* Mic icon inside orb */
  .mic-icon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
  }

  /* Transcript */
  .transcript {
    max-width: 320px;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 20px;
  }

  .user-text {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    font-style: italic;
  }

  .jarvis-text {
    font-size: 16px;
    color: #fff;
    line-height: 1.5;
  }

  /* Hold hint */
  .hint {
    position: fixed;
    bottom: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.8);
  }

  .model-badge {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">JARVIS</div>
  <div class="model-badge">JF Web Studios</div>
</div>

<div class="status" id="status">Tap to speak</div>

<div class="orb-container" id="orbContainer">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="orb" id="orb">
    <svg class="mic-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(255,255,255,0.8)"/>
      <path d="M5 10a7 7 0 0 0 14 0" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="17" x2="12" y2="21" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="21" x2="15" y2="21" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="transcript">
  <div class="user-text" id="userText"></div>
  <div class="jarvis-text" id="jarvisText"></div>
</div>

<div class="hint">Tap orb to speak</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const AGENT_URL = "https://app.base44.com/superagent/6a3581bb2a25b2dfe23bf70e";
const TTS_URL = "https://api.base44.com/api/apps/6a3581bb2a25b2dfe23bf70e/functions/jarvisVoice";

// ─── STATE ────────────────────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let conversationHistory = [];

// ─── ELEMENTS ─────────────────────────────────────────────────────────────────
const orb = document.getElementById('orb');
const status = document.getElementById('status');
const userText = document.getElementById('userText');
const jarvisText = document.getElementById('jarvisText');
const body = document.body;

// ─── SPEECH RECOGNITION SETUP ────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  setStatus('Browser not supported. Use Chrome or Safari.', 'error');
}

function setStatus(text, state = '') {
  status.textContent = text;
  status.className = 'status ' + state;
  body.className = state;
}

// ─── SPEAK VIA ELEVENLABS ────────────────────────────────────────────────────
async function speak(text) {
  setStatus('Speaking...', 'speaking');
  jarvisText.textContent = text;

  try {
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if (!res.ok) throw new Error('TTS failed');

    const blob = await res.blob();
    const audioUrl = URL.createObjectURL(blob);
    const audio = new Audio(audioUrl);

    audio.onended = () => {
      URL.revokeObjectURL(audioUrl);
      setStatus('Tap to speak', '');
    };

    await audio.play();
  } catch (err) {
    console.error('TTS error:', err);
    // Fallback to browser TTS
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.95;
    utterance.pitch = 0.85;
    utterance.onend = () => setStatus('Tap to speak', '');
    speechSynthesis.speak(utterance);
  }
}

// ─── SEND TO JARVIS AGENT ────────────────────────────────────────────────────
async function askJarvis(userMessage) {
  setStatus('Thinking...', 'thinking');
  userText.textContent = '"' + userMessage + '"';
  jarvisText.textContent = '';

  conversationHistory.push({ role: 'user', content: userMessage });

  try {
    // Use the superagent API
    const res = await fetch(`https://api.base44.com/api/apps/6a3581bb2a25b2dfe23bf70e/superagent/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userMessage,
        history: conversationHistory.slice(-10)
      })
    });

    let reply = '';

    if (res.ok) {
      const data = await res.json();
      reply = data.message || data.reply || data.response || JSON.stringify(data);
    } else {
      // Fallback: direct voice responses for common commands
      reply = getFallbackResponse(userMessage);
    }

    conversationHistory.push({ role: 'assistant', content: reply });
    await speak(reply);

  } catch (err) {
    console.error('Agent error:', err);
    const reply = getFallbackResponse(userMessage);
    await speak(reply);
  }
}

function getFallbackResponse(msg) {
  const m = msg.toLowerCase();
  if (m.includes('time')) return 'It is ' + new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
  if (m.includes('hello') || m.includes('hey') || m.includes('hi')) return 'Online and ready. What do you need?';
  if (m.includes('weather')) return 'I need internet access for that. Try again in a moment.';
  return 'Understood. Open the Base44 chat for full capabilities while the voice API connection is being finalized.';
}

// ─── VOICE INPUT ─────────────────────────────────────────────────────────────
function startListening() {
  if (!SpeechRecognition || isListening) return;

  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    setStatus('Listening...', 'active');
    userText.textContent = '';
    jarvisText.textContent = '';
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    isListening = false;
    askJarvis(transcript);
  };

  recognition.onerror = (event) => {
    isListening = false;
    if (event.error === 'no-speech') {
      setStatus('No speech detected. Tap to try again.', '');
    } else if (event.error === 'not-allowed') {
      setStatus('Microphone access denied.', 'error');
    } else {
      setStatus('Error: ' + event.error, 'error');
    }
  };

  recognition.onend = () => {
    isListening = false;
    if (body.className === 'active') setStatus('Tap to speak', '');
  };

  recognition.start();
}

function stopListening() {
  if (recognition && isListening) {
    recognition.stop();
    isListening = false;
  }
}

// ─── ORB TAP ─────────────────────────────────────────────────────────────────
orb.addEventListener('click', () => {
  if (isListening) {
    stopListening();
  } else if (body.className === '' || body.className === 'error') {
    startListening();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Test audio context
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.close();
  } catch(e) {}

  setStatus('Tap to speak', '');
});
</script>
</body>
</html>
